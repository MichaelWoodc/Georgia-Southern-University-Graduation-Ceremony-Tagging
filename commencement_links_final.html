    <script>
        function renderTable() {
            const tbody = document.getElementById("resultsBody");
            tbody.innerHTML = "";

            data.forEach(row => {
                const seconds = timestampToSeconds(row.timestamp);
                const yt = `https://www.youtube.com/watch?v=OEjQOwU3InU&t=${seconds}s`;

                const tr = document.createElement("tr");

                tr.innerHTML = `
                    <td>${row.ocr_text}</td>
                    <td>${row.timestamp}</td>
                    <td class="${row.confidence > 80 ? 'confidence-high' : 'confidence-low'}">
                        ${row.confidence}
                    </td>
                    <td><a class="btn" href="${yt}" target="_blank">View Clip</a></td>
                `;

                tbody.appendChild(tr);
            });
        }

        function timestampToSeconds(ts) {
            const [h, m, s] = ts.split(":");
            return Math.floor(+h * 3600 + +m * 60 + parseFloat(s));
        }

        function filterTable() {
            const filter = document.getElementById("searchInput").value.toUpperCase();
            const tr = document.getElementById("resultsTable").getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    const txt = td.textContent || td.innerText;
                    tr[i].style.display = txt.toUpperCase().includes(filter) ? "" : "none";
                }
            }
        }

        renderTable();
    </script>
